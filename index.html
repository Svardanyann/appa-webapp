<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ԱՊՊԱ / Վթարի Լուսանկարներ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h3 {
            margin-bottom: 20px;
            text-align: center;
            color: var(--tg-theme-hint-color, #707579);
        }

        /* Թաքնված իսկական ֆայլի դաշտը */
        #fileInput {
            display: none;
        }

        /* Գեղեցիկ կոճակ նկար ավելացնելու համար */
        .btn-upload {
            background-color: #248bca;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            transition: background-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-upload:active {
            background-color: #1f77aa;
        }

        /* Նկարների նախադիտման դաշտը (Grid) */
        .preview-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 350px;
            margin-top: 25px;
        }

        .preview-item {
            position: relative;
            width: 100%;
            padding-top: 100%; /* Սարքում է քառակուսի */
            border-radius: 8px;
            overflow: hidden;
            background-color: #f0f0f0;
            border: 1px solid #ddd;
        }

        .preview-item img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Ջնջելու փոքրիկ կոճակը նկարի անկյունում */
        .delete-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background-color: rgba(255, 0, 0, 0.8);
            color: white;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* Վերջնական ուղարկելու մեծ կոճակը */
        .btn-submit {
            background-color: var(--tg-theme-button-color, #31b545);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            margin-top: 30px;
            display: none; /* Հայտնվում է միայն նկար ընտրելիս */
        }
    </style>
</head>
<body>

    <h3>📸 Կցեք անհրաժեշտ լուսանկարները</h3>

    <input type="file" id="fileInput" accept="image/*" multiple>
    
    <button class="btn-upload" id="uploadBtn">➕ Ավելացնել լուսանկարներ</button>

    <div class="preview-container" id="previewContainer"></div>

    <button class="btn-submit" id="submitBtn">🚀 Ամեն ինչ ճիշտ է, Ուղարկել</button>

    <script>
        // Սկսում ենք աշխատանքը Telegram WebApp-ի հետ
        let tg = window.Telegram.WebApp;
        tg.expand(); // Մեծացնում ենք պատուհանը ամբողջ էկրանով

        const uploadBtn = document.getElementById('uploadBtn');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const submitBtn = document.getElementById('submitBtn');

        // Մեր ընտրած ֆայլերի զանգվածը
        let selectedFiles = [];

        // 1. Երբ սեղմում ենք գլխավոր կոճակին, կանչվում է թաքնված ֆայլերի պատուհանը
        uploadBtn.addEventListener('click', () => {
            fileInput.click();
        });

        // 2. Երբ օգտատերը նկարներ է ընտրում պատկերասրահից
        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            
            files.forEach(file => {
                selectedFiles.push(file);
            });

            updatePreview();
        });

        // 3. Ֆունկցիա՝ էկրանին նկարները ցույց տալու (Preview) համար
        function updatePreview() {
            previewContainer.innerHTML = ''; // Մաքրում ենք հինը

            selectedFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const div = document.createElement('div');
                    div.className = 'preview-item';
                    
                    div.innerHTML = `
                        <img src="${e.target.result}" alt="preview">
                        <button class="delete-btn" onclick="removeFile(${index})">X</button>
                    `;
                    
                    previewContainer.appendChild(div);
                }
                reader.readAsDataURL(file);
            });

            // Եթե նկար կա ընտրված, ցույց ենք տալիս «Ուղարկել» կոճակը
            if (selectedFiles.length > 0) {
                submitBtn.style.display = 'block';
            } else {
                submitBtn.style.display = 'none';
            }
        }

        // 4. Ֆունկցիա՝ նկարը ցուցակից հեռացնելու համար (եթե օգտատերը սխալվել է)
        window.removeFile = function(index) {
            selectedFiles.splice(index, 1);
            updatePreview();
        };

        // 5. Երբ սեղմում ենք «Ուղարկել» կոճակը
        submitBtn.addEventListener('click', () => {
            // Պատրաստում ենք JSON տվյալները Python բոտի համար
            let dataToSend = {
                action: "photos_uploaded",
                count: selectedFiles.length
            };

            // Ուղարկում ենք տվյալները Python կոդին
            tg.sendData(JSON.stringify(dataToSend));
            
            // Ավտոմատ փակում ենք WebApp պատուհանը
            tg.close();
        });
    </script>
</body>
</html>
